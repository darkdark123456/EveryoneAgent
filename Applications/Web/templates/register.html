{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6">
            注册
        </h1>

        <form id="register-form">
            <input id="username" type="text" placeholder="用户名" class="border w-full p-2 mb-4 rounded" />

            <input id="email" type="email" placeholder="邮箱" class="border w-full p-2 mb-4 rounded" />

            <input id="password" type="password" placeholder="密码" class="border w-full p-2 mb-4 rounded" />

            <button type="submit" class="bg-blue-500 text-white w-full p-2 rounded">
                注册
            </button>
        </form>

        <div class="mt-4">
            <a href="/login" class="text-blue-500">
                已有账号？去登录
            </a>
        </div>
    </div>
</div>

<script>
    document
        .getElementById("register-form")
        .addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    email,
                    password
                })
            });

            if (response.ok) {
                window.location.href = "/login";
            } else {
                alert("注册失败");
            }
        });
</script>

{% endblock %}
